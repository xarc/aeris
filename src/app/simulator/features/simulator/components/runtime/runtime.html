<mat-tab-group
  class="tabs"
  (selectedTabChange)="onTabChange($event)"
  [selectedIndex]="getSelectedIndex()"
  animationDuration="0ms"
>
  <mat-tab label="Edit">
    <div class="pane">
      <app-editor></app-editor>
    </div>
  </mat-tab>

  <mat-tab label="Execute">
    <div class="pane">
      <app-exec></app-exec>
    </div>
  </mat-tab>
</mat-tab-group>
