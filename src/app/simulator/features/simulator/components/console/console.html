<div class="console">
  <div class="console-scroll" #consoleContainer>
    <span class="text">{{ getConsole() }}</span>
  </div>

  @if (allowInput) {
    <div class="console-input">
      <span class="prompt">&gt;</span>
      <input
        type="text"
        [(ngModel)]="input"
        (keydown.enter)="onEnter()"
        class="input"
        placeholder="Enter command..."
        autocomplete="off"
        spellcheck="false"
      />
    </div>
  }

  <div class="status-bar">
    <div class="left">
      <span>RV32I</span>
      <span class="pc-value">PC: {{ pcHex }}</span>
      <span>{{ lineCount }} lines</span>
    </div>

    <div class="buttons">
      <button
        class="clear-icon"
        title="Export console"
        aria-label="Export console"
        (click)="exportConsole()"
      >
        <svg
          width="14"
          height="14"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M12 3v12" />
          <path d="M7 8l5-5 5 5" />
          <path d="M5 21h14" />
        </svg>
      </button>

      <button
        class="clear-icon"
        (click)="clearConsole()"
        title="Clear console"
        aria-label="Clear console"
      >
        <svg
          width="14"
          height="14"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <polyline points="3 6 5 6 21 6" />
          <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6" />
          <path d="M10 11v6" />
          <path d="M14 11v6" />
          <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2" />
        </svg>
      </button>
    </div>
  </div>
</div>
