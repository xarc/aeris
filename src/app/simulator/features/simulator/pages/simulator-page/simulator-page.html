<section class="simulator">
  <app-menu></app-menu>

  <div class="vertical-split">
    <div class="workspace" [style.flex-basis.%]="workspacePct">
      <div class="left">
        <app-runtime></app-runtime>
      </div>

      <div class="right">
        <app-registers></app-registers>
      </div>
    </div>

    <div class="resizer-wrapper">
      <div class="resizer-vertical" (pointerdown)="onVerticalResizerDown($event)">
        <div class="resizer-grip"></div>
      </div>
    </div>

    <div class="console-container">
      <app-console></app-console>
    </div>
  </div>
</section>
