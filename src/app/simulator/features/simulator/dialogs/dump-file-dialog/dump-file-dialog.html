<section class="dump-dialog">
  <app-dialog-header
    icon="dump"
    title="Dump Text Segment to File"
    description="Select an output format to export the program instructions"
    (close)="closeDialog()"
  ></app-dialog-header>
  <div class="content">
    <span class="section-label">Export format</span>

    <div class="format-list">
      @for (selectedType of types; track selectedType.id) {
        <button
          type="button"
          class="format-item"
          [class.selected]="type.id === selectedType.id"
          (click)="type = selectedType"
        >
          <span class="radio">
            <span class="dot" *ngIf="type.id === selectedType.id"></span>
          </span>

          <div class="info">
            <div class="label">
              {{ selectedType.label.charAt(0).toUpperCase() + selectedType.label.slice(1) }}
            </div>
            <div class="description">{{ selectedType.description }}</div>
          </div>
        </button>
      }
    </div>
  </div>

  <footer class="actions">
    <button class="cancel" (click)="closeDialog()">Cancel</button>
    <button class="confirm" (click)="dumpFile()">Export Dump</button>
  </footer>
</section>
